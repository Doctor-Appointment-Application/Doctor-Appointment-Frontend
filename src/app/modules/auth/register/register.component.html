<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Register as a patient or doctor</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" class="form-input" placeholder="Your full name" />
        <span class="error-text" *ngIf="form.get('fullName')?.invalid && form.get('fullName')?.touched">Full name is required</span>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" class="form-input" placeholder="Email address" />
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email required</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-input" placeholder="Min 6 characters" />
        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Password must be at least 6 characters</span>
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="text" formControlName="phone" class="form-input" placeholder="Phone number" />
      </div>
      <div class="form-group">
        <label>Register As</label>
        <select formControlName="role" class="form-input">
          <option value="Patient">Patient</option>
          <option value="Doctor">Doctor</option>
        </select>
      </div>
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        <span *ngIf="loading">Creating account...</span>
        <span *ngIf="!loading">Create Account</span>
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/auth/login">Login here</a></p>
  </div>
</div>
