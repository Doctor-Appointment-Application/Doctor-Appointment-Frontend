<div class="page-container">
  <div class="page-header">
    <h1>Doctor Dashboard</h1>
    <p>Welcome back, Dr. {{ auth.currentUser$ | async | json }}</p>
  </div>
  <div class="stats-grid" *ngIf="summary">
    <div class="stat-card blue">
      <div class="stat-value">{{ summary.totalAppointments }}</div>
      <div class="stat-label">Today's Appointments</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value">{{ summary.onlineCount }}</div>
      <div class="stat-label">Online</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-value">{{ summary.offlineCount }}</div>
      <div class="stat-label">Offline</div>
    </div>
  </div>
  <div class="quick-nav">
    <a routerLink="appointments" class="nav-btn">📋 View Appointments</a>
    <a routerLink="schedule" class="nav-btn">📅 Manage Schedule</a>
  </div>
</div>
